repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: ^frontend/src/app/globals\.css$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [ --fix ]
        files: ^backend/
        exclude: |
          (?x)^(
            backend/apps/billing/.*|
            backend/apps/patients/api/views/legacy_views\.py|
            backend/elo_terapeutico/settings/base\.py|
            backend/elo_terapeutico/settings/prod\.py|
            backend/elo_terapeutico/urls\.py
          )$
      - id: ruff-format
        files: ^backend/
        exclude: |
          (?x)^(
            backend/apps/billing/.*|
            backend/apps/patients/api/views/legacy_views\.py|
            backend/elo_terapeutico/settings/base\.py|
            backend/elo_terapeutico/settings/prod\.py|
            backend/elo_terapeutico/urls\.py
          )$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs
          - djangorestframework-stubs
          - types-requests
          - types-pytz
          - django-environ
          - django-unfold
          - djangorestframework-simplejwt
          - django-filter
          - drf-spectacular
          - django-cors-headers
          - django-ratelimit
          - cryptography
        args: ["--config-file=backend/pyproject.toml"]
        files: ^backend/
        exclude: |
          (?x)^(
            backend/apps/patients/dashboard_queries\.py|
            backend/apps/patients/api/review_filter\.py|
            backend/apps/records/management/commands/run_export_worker\.py|
            backend/apps/records/evolution_flow_models\.py|
            backend/apps/records/utils\.py|
            backend/apps/agenda/model_parts/appointments\.py|
            backend/apps/patients/review_filter\.py|
            backend/apps/users/managers\.py|
            backend/quality/.*|
            backend/core/fields\.py|
            backend/core/audit\.py|
            backend/elo_terapeutico/settings/test\.py|
            backend/conftest\.py|
            .*/tests/.*
          )$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", "backend/pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^backend/
