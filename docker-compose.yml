# Composição destinada ao desenvolvimento local e à validação da arquitetura de produção.
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD
      - POSTGRES_DB=${POSTGRES_DB:-config}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-configure-senha-local-redis}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.txt
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment: &backend_environment
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api-sandbox.asaas.com/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://:configure-senha-local-redis@redis:6379/0}
      REDIS_RESULT_URL: ${REDIS_RESULT_URL:-redis://:configure-senha-local-redis@redis:6379/1}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:configure-senha-local-redis@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:configure-senha-local-redis@redis:6379/1}
      TELEMEDICINE_ENABLED: ${TELEMEDICINE_ENABLED:-False}
      TELEMEDICINE_PROVIDER: ${TELEMEDICINE_PROVIDER:-livekit}
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      TELEMEDICINE_REQUIRE_E2EE: ${TELEMEDICINE_REQUIRE_E2EE:-True}
      TELEMEDICINE_JOIN_BEFORE_MINUTES: ${TELEMEDICINE_JOIN_BEFORE_MINUTES:-15}
      TELEMEDICINE_JOIN_AFTER_MINUTES: ${TELEMEDICINE_JOIN_AFTER_MINUTES:-30}
      TELEMEDICINE_PROVIDER_TOKEN_TTL_SECONDS: ${TELEMEDICINE_PROVIDER_TOKEN_TTL_SECONDS:-300}
      TELEMEDICINE_EMPTY_ROOM_TIMEOUT_SECONDS: ${TELEMEDICINE_EMPTY_ROOM_TIMEOUT_SECONDS:-300}
      TELEMEDICINE_MAX_PARTICIPANTS: ${TELEMEDICINE_MAX_PARTICIPANTS:-2}
      TELEMEDICINE_MAINTENANCE_INTERVAL_SECONDS: ${TELEMEDICINE_MAINTENANCE_INTERVAL_SECONDS:-300}
      COMMUNICATIONS_ENABLED: ${COMMUNICATIONS_ENABLED:-True}
      COMMUNICATIONS_BATCH_SIZE: ${COMMUNICATIONS_BATCH_SIZE:-50}
      COMMUNICATIONS_MAX_ATTEMPTS: ${COMMUNICATIONS_MAX_ATTEMPTS:-5}
      COMMUNICATIONS_PROCESSING_TIMEOUT_MINUTES: ${COMMUNICATIONS_PROCESSING_TIMEOUT_MINUTES:-15}
      COMMUNICATIONS_DEFAULT_TIMEZONE: ${COMMUNICATIONS_DEFAULT_TIMEZONE:-America/Sao_Paulo}
      COMMUNICATIONS_REPLY_TO: ${COMMUNICATIONS_REPLY_TO:-}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-}
      WHATSAPP_API_BASE_URL: ${WHATSAPP_API_BASE_URL:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER: ${SMS_SENDER:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready/', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        LIVEKIT_URL: ${LIVEKIT_URL:-}
    env_file:
      - .env
    environment:
      - BACKEND_API_URL=http://backend:8000/api/v1/
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1/
      - LIVEKIT_URL=${LIVEKIT_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  celery-worker-exports:
    build: &backend_build
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.txt
    command: >
      celery -A config worker --loglevel=INFO --queues=exports
      --concurrency=${CELERY_EXPORT_CONCURRENCY:-1} --hostname=exports@%h
    env_file:
      - .env
    environment: *backend_environment
    depends_on: &worker_dependencies
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 45s
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination=exports@$$HOSTNAME --timeout=5 | grep pong"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-worker-communications:
    build: *backend_build
    command: >
      celery -A config worker --loglevel=INFO --queues=communications
      --concurrency=${CELERY_COMMUNICATIONS_CONCURRENCY:-2} --hostname=communications@%h
    env_file:
      - .env
    environment: *backend_environment
    depends_on: *worker_dependencies
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination=communications@$$HOSTNAME --timeout=5 | grep pong"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-worker-default:
    build: *backend_build
    command: >
      celery -A config worker --loglevel=INFO --queues=default
      --concurrency=${CELERY_DEFAULT_CONCURRENCY:-1} --hostname=default@%h
    env_file:
      - .env
    environment: *backend_environment
    depends_on: *worker_dependencies
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination=default@$$HOSTNAME --timeout=5 | grep pong"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-beat:
    build: *backend_build
    command: >
      celery -A config beat --loglevel=INFO
      --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment: *backend_environment
    depends_on: *worker_dependencies
    restart: unless-stopped
    stop_grace_period: 20s
    volumes:
      - ./backend:/app
      - celery_beat_data:/tmp
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data:
  backend_static:
  celery_beat_data:
