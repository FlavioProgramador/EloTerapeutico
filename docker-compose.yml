# Composição destinada ao desenvolvimento local.
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD
      - POSTGRES_DB=${POSTGRES_DB:-elo_terapeutico}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Evita expor o banco para outros dispositivos da rede local.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment: &backend_environment
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api-sandbox.asaas.com/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      COMMUNICATIONS_ENABLED: ${COMMUNICATIONS_ENABLED:-True}
      COMMUNICATIONS_BATCH_SIZE: ${COMMUNICATIONS_BATCH_SIZE:-50}
      COMMUNICATIONS_MAX_ATTEMPTS: ${COMMUNICATIONS_MAX_ATTEMPTS:-5}
      COMMUNICATIONS_PROCESSING_TIMEOUT_MINUTES: ${COMMUNICATIONS_PROCESSING_TIMEOUT_MINUTES:-15}
      COMMUNICATIONS_DEFAULT_TIMEZONE: ${COMMUNICATIONS_DEFAULT_TIMEZONE:-America/Sao_Paulo}
      COMMUNICATIONS_REPLY_TO: ${COMMUNICATIONS_REPLY_TO:-}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-}
      WHATSAPP_API_BASE_URL: ${WHATSAPP_API_BASE_URL:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_SENDER: ${SMS_SENDER:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1/
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py run_export_worker
    env_file:
      - .env
    environment: *backend_environment
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s
    volumes:
      - ./backend:/app

  communications-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py process_communications --sleep 5
    env_file:
      - .env
    environment: *backend_environment
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 20s
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy --fail-level ERROR"]
      interval: 60s
      timeout: 20s
      retries: 3

  communications-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "while true; do
        python manage.py schedule_communication_automations;
        python manage.py retry_failed_communications;
        python manage.py cleanup_expired_communication_tokens;
        sleep 300;
      done"
    env_file:
      - .env
    environment: *backend_environment
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 20s
    volumes:
      - ./backend:/app

volumes:
  db_data:
  backend_static:
