name: Tenant Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  django-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: diagnostic-only-secret-key-not-for-production
      JWT_SECRET: diagnostic-only-jwt-key-not-for-production
      FIELD_ENCRYPTION_KEY: diagnostic-only-field-key-32chars
      ASAAS_WEBHOOK_TOKEN: diagnostic-only-webhook-token
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --quiet -r requirements.txt
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py migrate --noinput
