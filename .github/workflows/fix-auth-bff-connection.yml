name: Corrigir conexão do BFF de autenticação

on:
  push:
    branches:
      - agent/telemedicina-livekit
    paths:
      - .github/workflows/fix-auth-bff-connection.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-auth-bff-connection.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v7
        with:
          ref: agent/telemedicina-livekit
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Remover header hop-by-hop
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/lib/server/auth-bff.ts")
          source = path.read_text(encoding="utf-8")
          line = '  headers.set("connection", "close");\n'
          if line not in source:
              raise SystemExit("Header connection não encontrado.")
          path.write_text(source.replace(line, "", 1), encoding="utf-8")
          PY
          git add frontend/src/lib/server/auth-bff.ts
          git commit -m "fix(auth): remove header hop-by-hop do BFF"
          git push origin HEAD:agent/telemedicina-livekit

      - name: Remover workflow temporário
        run: |
          git pull --rebase origin agent/telemedicina-livekit
          rm .github/workflows/fix-auth-bff-connection.yml
          git add .github/workflows/fix-auth-bff-connection.yml
          git commit -m "ci: remove workflow temporário do BFF"
          git push origin HEAD:agent/telemedicina-livekit
