name: Billing Validation

on:
  pull_request:
    paths:
      - "backend/apps/billing/**"
      - "backend/elo_terapeutico/settings/**"
      - "backend/requirements/**"
      - "backend/requirements.txt"
      - "frontend/src/features/billing/**"
      - "frontend/src/features/landing/pricing.tsx"
      - "frontend/src/app/checkout/**"
      - "frontend/src/lib/api.ts"
      - "frontend/src/lib/auth-flow.ts"
      - "frontend/src/lib/auth-session.ts"
      - "frontend/src/contexts/auth.tsx"
      - "frontend/auth-flow.test.mjs"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - ".github/workflows/billing-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend billing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///billing-ci.sqlite3
      SECRET_KEY: billing-ci-secret-key-with-sufficient-length
      JWT_SECRET: billing-ci-jwt-secret-with-sufficient-length
      FIELD_ENCRYPTION_KEY: billing-ci-field-key-with-sufficient-length
      DEBUG: "True"
      ASAAS_API_KEY: test-api-key
      ASAAS_BASE_URL: https://api-sandbox.asaas.com/v3
      ASAAS_WEBHOOK_TOKEN: billing-ci-webhook-token-with-sufficient-length
      BILLING_GRACE_PERIOD_DAYS: "5"
      BILLING_WEBHOOK_MAX_RETRIES: "5"
      BILLING_WEBHOOK_PROCESS_INLINE: "True"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py migrate --noinput
      - run: pytest apps/billing/tests -q

  frontend:
    name: Frontend billing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1/
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:auth
      - run: npm run build
