name: Django CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Backend checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///ci.sqlite3

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements/*.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Run Django system checks
        run: python manage.py check

      - name: Check for missing migrations
        shell: bash
        run: |
          set -o pipefail
          python manage.py makemigrations --check --dry-run 2>&1 | tee migration-output.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run pre-commit checks (Linting & Quality)
        working-directory: .
        run: pre-commit run --all-files

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          pytest --cov=apps --cov=core --cov-report=term-missing --cov-report=xml 2>&1 | tee pytest-output.txt

      - name: Upload coverage and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-reports
          path: |
            backend/coverage.xml
            backend/pytest-output.txt
            backend/migration-output.txt
          if-no-files-found: ignore
          retention-days: 7
