name: Django CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: django-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend checks with PostgreSQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: elo_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d elo_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/elo_ci
      ASAAS_API_KEY: ""
      BILLING_WEBHOOK_PROCESS_INLINE: "True"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-prod.txt

      - name: Generate ephemeral CI credentials
        shell: bash
        run: |
          python - <<'PY'
          import os
          import secrets

          values = {
              "SECRET_KEY": secrets.token_urlsafe(64),
              "JWT_SECRET": secrets.token_urlsafe(64),
              "FIELD_ENCRYPTION_KEY": secrets.token_urlsafe(32),
              "ASAAS_WEBHOOK_TOKEN": secrets.token_urlsafe(32),
          }
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              for key, value in values.items():
                  env_file.write(f"{key}={value}\n")
          PY

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate backend architecture
        run: python apps/core/quality/check_backend_architecture.py

      - name: Run Django system checks
        shell: bash
        run: |
          set -o pipefail
          python manage.py check 2>&1 | tee check-output.txt

      - name: Check for missing migrations
        shell: bash
        run: |
          set -o pipefail
          python manage.py makemigrations --check --dry-run 2>&1 | tee migration-output.txt

      - name: Apply migrations on PostgreSQL
        run: python manage.py migrate --noinput

      - name: Run Ruff gate
        shell: bash
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee ruff-output.txt

      - name: Run mypy gate
        shell: bash
        run: |
          set -o pipefail
          mypy . 2>&1 | tee mypy-output.txt

      - name: Run tests on PostgreSQL
        shell: bash
        run: |
          set -o pipefail
          pytest --create-db --cov=apps --cov-report=term-missing --cov-report=xml 2>&1 | tee pytest-output.txt

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-reports
          path: |
            backend/coverage.xml
            backend/check-output.txt
            backend/pytest-output.txt
            backend/migration-output.txt
            backend/ruff-output.txt
            backend/mypy-output.txt
          if-no-files-found: ignore
          retention-days: 7
