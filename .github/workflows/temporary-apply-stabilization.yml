name: Temporary apply stabilization

on:
  push:
    branches:
      - "agent/estabilizacao-completa-site"
    paths:
      - ".github/workflows/temporary-apply-stabilization.yml"

permissions:
  contents: write

jobs:
  apply:
    name: Apply validated stabilization patches
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v7
        with:
          ref: agent/estabilizacao-completa-site
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Normalize temporary CI patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.tmp/stabilization-ci.patch')
          lines = path.read_text(encoding='utf-8').splitlines()
          normalized = []
          strip_prefix = False
          for line in lines:
              if line.startswith('+diff --git a/.github/workflows/backend-security.yml'):
                  strip_prefix = True
              if strip_prefix and line.startswith('+'):
                  line = line[1:]
              normalized.append(line)
          path.write_text('\n'.join(normalized) + '\n', encoding='utf-8')
          PY

      - name: Apply security and observability
        run: |
          git apply --check .tmp/stabilization-security.patch
          git apply .tmp/stabilization-security.patch
          git add .env.example backend/.env.example backend/apps/audit/services/request_context.py backend/apps/core/api/exceptions.py backend/apps/core/middleware.py backend/apps/core/tests/test_request_security_middleware.py backend/config/settings/base.py backend/config/settings/production.py
          git commit -m "security: adiciona correlação e headers defensivos"

      - name: Apply API contract and tenant gates
        run: |
          git apply --check .tmp/stabilization-ci.patch
          git apply .tmp/stabilization-ci.patch
          git add .github/workflows/api-contract.yml .github/workflows/backend-security.yml .github/workflows/django-ci.yml scripts/validate_api_contract.py
          git commit -m "ci: valida contrato OpenAPI e integridade tenant"

      - name: Apply Next.js proxy migration
        run: |
          git apply --check .tmp/stabilization-frontend.patch
          git apply .tmp/stabilization-frontend.patch
          git add -A frontend/auth-bff.test.mjs frontend/package.json frontend/src/middleware.ts frontend/src/proxy.ts
          git commit -m "refactor(frontend): migra middleware para proxy do Next"

      - name: Reconcile canonical documentation
        env:
          LIMITATIONS_B64: ""
          PLAN_B64: ""
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          sha = 'be9116d6c9adc40f35d421761a3318aac179ae30'
          old_sha = '75827a2dbfe7d4f86f0865f05d9a5a8f660e0f78'

          Path('docs/01-visao-geral/limitacoes.md').write_bytes(base64.b64decode(os.environ['LIMITATIONS_B64']))
          Path('docs/17-referencia/plano-estabilizacao-completa.md').write_bytes(base64.b64decode(os.environ['PLAN_B64']))

          for name in ('README.md', 'docs/17-referencia/status-do-projeto.md'):
              path = Path(name)
              text = path.read_text(encoding='utf-8').replace(old_sha, sha)
              text = text.replace('23/07/2026', '24/07/2026').replace('23 de julho de 2026', '24 de julho de 2026')
              path.write_text(text, encoding='utf-8')

          path = Path('docs/README.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              f'contra a branch `main`, no commit `{old_sha}`, em 23 de julho de 2026.',
              f'contra a branch `main`, com baseline atualizado a partir da `main` no commit `{sha}`, em 24 de julho de 2026.',
          )
          text = text.replace('- [Inventário tecnológico](17-referencia/inventario-tecnologico.md)\n', '- [Inventário tecnológico](17-referencia/inventario-tecnologico.md)\n- [Plano de estabilização completa](17-referencia/plano-estabilizacao-completa.md)\n')
          text = text.replace('- **Data:** 23/07/2026;', '- **Data do baseline atual:** 24/07/2026;')
          text = text.replace(f'- **Commit-base:** `{old_sha}`;', f'- **Commit-base:** `{sha}`;')
          text = text.replace('- **Relatório desta revisão:** [Relatório da refatoração documental](17-referencia/relatorio-refatoracao-documental-2026-07-23.md).', '- **Plano da estabilização atual:** [Plano de estabilização completa](17-referencia/plano-estabilizacao-completa.md).')
          path.write_text(text, encoding='utf-8')

          path = Path('docs/10-testes/README.md')
          text = path.read_text(encoding='utf-8').replace('Commit-base documentado: `176cba63ed3edf1cee232363e5a89c4b7fda28ac`.', f'Baseline mais recente documentado: `{sha}`, medido em 24/07/2026. Consulte o relatório da estabilização para os resultados associados ao SHA final.')
          path.write_text(text, encoding='utf-8')

          path = Path('docs/17-referencia/README.md')
          text = path.read_text(encoding='utf-8').replace('- [Auditoria do backlog](auditoria-backlog.md)\n', '- [Auditoria do backlog](auditoria-backlog.md)\n- [Plano de estabilização completa](plano-estabilizacao-completa.md)\n')
          path.write_text(text, encoding='utf-8')

          path = Path('docs/17-referencia/auditoria-backlog.md')
          text = path.read_text(encoding='utf-8')
          notice = '> **Documento histórico.** Esta classificação retrata a auditoria de 20/07/2026 e não representa o estado atual da `main`. Após essa data foram integrados `apps.organizations`, autenticação tenant-aware, mídia LiveKit, quarentena de uploads e outras mudanças. Para o estado vigente, consulte [Status do projeto](status-do-projeto.md), [Matriz de módulos](matriz-de-modulos.md) e [Plano de estabilização completa](plano-estabilizacao-completa.md).\n\n'
          if notice not in text:
              text = text.replace('# Auditoria do backlog\n\n', '# Auditoria do backlog\n\n' + notice)
          text = text.replace('Nenhuma issue foi encerrada apenas com base na existência de arquivos.', 'As linhas abaixo devem ser interpretadas como fotografia histórica. Nenhuma issue foi encerrada apenas com base na existência de arquivos.')
          path.write_text(text, encoding='utf-8')

          path = Path('docs/04-configuracao/variaveis-de-ambiente.md')
          text = path.read_text(encoding='utf-8')
          if 'SECURITY_PERMISSIONS_POLICY' not in text:
              section = '''\n### Headers defensivos e correlação\n\n| Variável | Componente | Obrigatória | Finalidade |\n| --- | --- | --- | --- |\n| `SECURITY_PERMISSIONS_POLICY` | backend | Não | Define recursos de navegador permitidos. O padrão bloqueia câmera, microfone, geolocalização, pagamentos e USB fora de páginas que usem política própria. |\n| `SECURITY_CROSS_ORIGIN_RESOURCE_POLICY` | backend | Não | Define `Cross-Origin-Resource-Policy`; o padrão é `same-site`. |\n| `SECURITY_CONTENT_SECURITY_POLICY` | backend | Produção | CSP explícita. Produção possui padrão restritivo e deve ser ajustada somente aos domínios realmente utilizados. |\n\nTodas as respostas incluem `X-Request-ID`. O backend aceita um identificador externo somente quando usa caracteres seguros e possui no máximo 64 caracteres; caso contrário, gera um UUID hexadecimal. O header é exposto por CORS para diagnóstico do suporte.\n\n'''
              text = text.replace('\n[Voltar](README.md)', '\n' + section + '[Voltar](README.md)')
          path.write_text(text, encoding='utf-8')
          PY
          git add README.md docs
          git commit -m "docs: registra baseline e plano de estabilização"

      - name: Remove temporary tooling and push
        run: |
          rm -f \
            .tmp/stabilization-security.patch \
            .tmp/stabilization-ci.patch \
            .tmp/stabilization-frontend.patch \
            .github/workflows/temporary-source-snapshot.yml \
            .github/workflows/temporary-apply-stabilization.yml
          rmdir .tmp 2>/dev/null || true
          git add -A .tmp .github/workflows/temporary-source-snapshot.yml .github/workflows/temporary-apply-stabilization.yml
          git commit -m "ci: remove ferramentas temporárias de aplicação"
          git push origin HEAD:agent/estabilizacao-completa-site
