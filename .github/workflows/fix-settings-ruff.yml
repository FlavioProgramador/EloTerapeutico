name: Correção temporária de importação

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-settings-ruff.yml

permissions:
  contents: write

jobs:
  fix-ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0
          show-progress: false

      - name: Ordenar imports locais
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/apps/users/api/views.py')
          content = path.read_text()
          old = '''        from apps.audit.services.access_logging import log_access
          from apps.audit.models import AuditLog
'''
          new = '''        from apps.audit.models import AuditLog
          from apps.audit.services.access_logging import log_access
'''
          if old in content:
              content = content.replace(old, new)
          path.write_text(content)
          PY

          if git diff --quiet -- backend/apps/users/api/views.py; then
            echo 'Imports já ordenados.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/apps/users/api/views.py
          git commit --no-verify -m 'fix: ordena imports das configurações'
          git push origin HEAD:feat/settings-notifications
