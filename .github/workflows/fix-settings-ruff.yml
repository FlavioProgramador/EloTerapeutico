name: Correção temporária de importação

on:
  push:
    branches:
      - feat/settings-notifications
    paths:
      - .github/workflows/fix-settings-ruff.yml

permissions:
  contents: write

jobs:
  fix-ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0
          show-progress: false

      - name: Ordenar imports locais
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/apps/users/api/views.py")
          lines = path.read_text().splitlines()
          service_import = "        from apps.audit.services.access_logging import log_access"
          model_import = "        from apps.audit.models import AuditLog"

          service_index = lines.index(service_import)
          model_index = lines.index(model_import)
          if service_index < model_index:
              lines[service_index], lines[model_index] = lines[model_index], lines[service_index]
              path.write_text("\n".join(lines) + "\n")
          PY

          if git diff --quiet -- backend/apps/users/api/views.py; then
            echo 'Imports já ordenados.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/apps/users/api/views.py
          git commit --no-verify -m 'fix: ordena imports das configurações'
          git push origin HEAD:feat/settings-notifications
