name: Aplicar módulo de documentos

on:
  push:
    branches:
      - feat-modulo-documentos-completo

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar implementação
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/documents/part-* > /tmp/documents-overlay.zip
          unzip -t /tmp/documents-overlay.zip
          unzip -o /tmp/documents-overlay.zip -d .
          rm -rf .bootstrap
          rm -f .github/workflows/apply-documents-overlay.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração para aplicar."
            exit 0
          fi
          git commit -m "feat(documents): implementar módulo completo"
          git push origin HEAD:feat-modulo-documentos-completo
