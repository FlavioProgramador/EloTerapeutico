name: PR218 Lockfile Repair

on:
  push:
    branches:
      - agent/corrige-onboarding-organizacao
    paths:
      - ".github/workflows/pr218-fix-lock.yml"

permissions:
  contents: write

jobs:
  repair-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: agent/corrige-onboarding-organizacao
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Update vulnerable transitive dependencies
        working-directory: frontend
        run: npm update brace-expansion js-yaml --package-lock-only --ignore-scripts

      - name: Commit repaired lockfile
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(git status --short frontend/package-lock.json)"
          printf '%s\n' 'Lockfile reparado.' > .github/pr218-lock-repaired
          git add frontend/package-lock.json .github/pr218-lock-repaired
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(deps): atualiza dependencias transitivas vulneraveis"
          git push origin HEAD:agent/corrige-onboarding-organizacao
