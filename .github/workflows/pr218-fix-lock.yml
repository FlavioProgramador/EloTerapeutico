name: PR218 Lockfile Repair

on:
  push:
    branches:
      - agent/corrige-onboarding-organizacao
    paths:
      - ".github/workflows/pr218-fix-lock.yml"

permissions:
  contents: write

jobs:
  repair-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: agent/corrige-onboarding-organizacao
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Regenerate secure lockfile
        working-directory: frontend
        shell: bash
        run: |
          npm audit fix --package-lock-only --ignore-scripts || true

      - name: Validate clean installation
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Validate high severity audit gate
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Commit repaired lockfile and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- frontend/package-lock.json && {
            echo "O lockfile não foi alterado pelo npm audit fix."
            exit 1
          }
          printf '%s\n' 'Lockfile reparado e validado pelo npm audit.' > .github/pr218-lock-repaired
          git rm .github/workflows/pr218-fix-lock.yml
          git add frontend/package-lock.json .github/pr218-lock-repaired
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(deps): atualiza lockfile e corrige auditoria npm"
          git push origin HEAD:agent/corrige-onboarding-organizacao
