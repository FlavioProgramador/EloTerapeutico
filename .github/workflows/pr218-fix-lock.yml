name: PR218 Lockfile Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr218-fix-lock.yml"

permissions:
  contents: read

jobs:
  repair-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Update vulnerable transitive dependencies
        working-directory: frontend
        run: npm update brace-expansion js-yaml --package-lock-only --ignore-scripts

      - name: Validate clean installation
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Validate high severity audit gate
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Upload repaired lockfile
        uses: actions/upload-artifact@v4
        with:
          name: pr218-repaired-lockfile
          path: frontend/package-lock.json
          retention-days: 1
