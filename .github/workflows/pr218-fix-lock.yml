name: PR218 Lockfile Repair

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr218-fix-lock.yml"

permissions:
  contents: write

jobs:
  repair-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v7
        with:
          ref: agent/corrige-onboarding-organizacao
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply secure transitive dependency overrides
        working-directory: frontend
        shell: bash
        run: |
          npm pkg set 'overrides.sharp=^0.35.0'
          npm pkg set 'overrides.postcss=^8.5.10'
          npm update brace-expansion js-yaml --package-lock-only --ignore-scripts
          npm install --package-lock-only --ignore-scripts

      - name: Validate clean installation
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build Next.js application
        working-directory: frontend
        run: npm run build

      - name: Validate high severity audit gate
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Publish validated manifests and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/pr218-fix-lock.yml
          git add frontend/package.json frontend/package-lock.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(deps): corrige dependencias transitivas vulneraveis"
          git push origin HEAD:agent/corrige-onboarding-organizacao
