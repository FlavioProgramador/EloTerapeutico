name: Backend Security

on:
  push:
    branches:
      - "security/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-security.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-security.yml"

permissions:
  contents: read

concurrency:
  group: backend-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: elo_terapeutico.settings.test
      SECRET_KEY: ci-only-secret-key-not-used-outside-actions
      JWT_SECRET: ci-only-jwt-key-not-used-outside-actions
      DATABASE_URL: sqlite:///test.sqlite3
      FIELD_ENCRYPTION_KEY: ci-only-field-encryption-key
      ASAAS_API_KEY: ""
      ASAAS_WEBHOOK_TOKEN: ci-webhook-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/dev.txt

      - name: Instalar bibliotecas do sistema
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt
          python -m pip install "bandit>=1.7,<2.0" "pip-audit>=2.7,<3.0"

      - name: Django check
        run: python manage.py check

      - name: Verificar migrations pendentes
        run: python manage.py makemigrations --check --dry-run

      - name: Ruff nos arquivos Python alterados
        shell: bash
        run: |
          cd ..
          git diff --name-only --diff-filter=ACMRT origin/main...HEAD -- "backend/**/*.py" > /tmp/changed-python-files.txt
          if [ -s /tmp/changed-python-files.txt ]; then
            xargs ruff check --config backend/pyproject.toml < /tmp/changed-python-files.txt
          else
            echo "Nenhum arquivo Python alterado."
          fi

      - name: Testes automatizados
        run: pytest --create-db

      - name: Bandit
        continue-on-error: true
        run: bandit -r apps core infrastructure elo_terapeutico -c pyproject.toml -f screen

      - name: Auditoria de dependências Python
        continue-on-error: true
        run: pip-audit -r requirements/base.txt
