name: Backend Security

on:
  push:
    branches:
      - "security/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-security.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-security.yml"

permissions:
  contents: read

concurrency:
  group: backend-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: elo_security_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d elo_security_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/elo_security_ci
      ASAAS_API_KEY: ""
      BILLING_WEBHOOK_PROCESS_INLINE: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-prod.txt

      - name: Gerar credenciais efêmeras de CI
        shell: bash
        run: |
          python - <<'PY'
          import os
          import secrets

          values = {
              "SECRET_KEY": secrets.token_urlsafe(64),
              "JWT_SECRET": secrets.token_urlsafe(64),
              "FIELD_ENCRYPTION_KEY": secrets.token_urlsafe(32),
              "ASAAS_WEBHOOK_TOKEN": secrets.token_urlsafe(32),
          }
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              for key, value in values.items():
                  env_file.write(f"{key}={value}\n")
          PY

      - name: Instalar bibliotecas do sistema
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "bandit>=1.7,<2.0" "pip-audit>=2.7,<3.0"

      - name: Validar arquitetura
        run: python apps/core/quality/check_backend_architecture.py

      - name: Django check
        run: python manage.py check

      - name: Verificar migrations pendentes
        run: python manage.py makemigrations --check --dry-run

      - name: Aplicar migrations no PostgreSQL
        run: python manage.py migrate --noinput

      - name: Ruff obrigatório
        shell: bash
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee /tmp/ruff-output.txt

      - name: mypy obrigatório
        shell: bash
        run: |
          set -o pipefail
          mypy . 2>&1 | tee /tmp/mypy-output.txt

      - name: Testes automatizados
        shell: bash
        run: |
          set -o pipefail
          pytest --create-db 2>&1 | tee /tmp/pytest-output.txt

      - name: Bandit obrigatório
        shell: bash
        run: |
          set -o pipefail
          bandit -r apps config -c pyproject.toml -f screen 2>&1 | tee /tmp/bandit-output.txt

      - name: Auditoria obrigatória de dependências Python
        shell: bash
        run: |
          set -o pipefail
          pip-audit -r requirements-prod.txt 2>&1 | tee /tmp/pip-audit-output.txt

      - name: Publicar relatórios de segurança
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            /tmp/ruff-output.txt
            /tmp/mypy-output.txt
            /tmp/pytest-output.txt
            /tmp/bandit-output.txt
            /tmp/pip-audit-output.txt
          retention-days: 3
          if-no-files-found: warn
