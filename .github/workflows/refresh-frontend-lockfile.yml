name: Refresh frontend lockfile

on:
  push:
    branches:
      - "agent/refatoracao-documentacao-completa"
    paths:
      - ".github/workflows/refresh-frontend-lockfile.yml"

permissions:
  contents: write

jobs:
  refresh:
    name: Update package-lock.json
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: agent/refatoracao-documentacao-completa

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Refresh lockfile
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validate lockfile
        working-directory: frontend
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Commit generated lockfile
        run: |
          git diff --check
          git add frontend/package-lock.json
          if git diff --cached --quiet; then
            echo "package-lock.json já está atualizado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(deps): atualiza lockfile do frontend"
          git push origin HEAD:agent/refatoracao-documentacao-completa
