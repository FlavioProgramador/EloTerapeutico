name: Tenant Diagnostic DB

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  django-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: sqlite:///diagnostic.sqlite3
      SECRET_KEY: diagnostic-test-value
      JWT_SECRET: diagnostic-test-value
      FIELD_ENCRYPTION_KEY: diagnostic-test-value-32-bytes
      ASAAS_WEBHOOK_TOKEN: diagnostic-test-value
    steps:
      - name: Preparar código
        run: git clone --quiet --depth 1 --branch agent/multi-tenancy-organizations-onboarding https://github.com/FlavioProgramador/EloTerapeutico.git source
      - name: Instalar dependências
        working-directory: source/backend
        run: python3 -m pip install --quiet -r requirements.txt
      - name: Verificar Django
        working-directory: source/backend
        run: python3 manage.py check
      - name: Verificar migrations
        working-directory: source/backend
        run: python3 manage.py makemigrations --check --dry-run
      - name: Aplicar migrations
        working-directory: source/backend
        run: python3 manage.py migrate --noinput
