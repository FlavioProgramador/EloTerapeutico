name: Correção temporária de configurações

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/debug-settings-ci.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0
          show-progress: false

      - name: Corrigir backend e frontend
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          models = Path('backend/apps/users/models.py')
          content = models.read_text()
          content = content.replace(
              'from django.utils import timezone\n',
              'from django.utils import timezone as django_timezone\n',
          )
          content = content.replace('timezone.now', 'django_timezone.now')
          models.write_text(content)

          bell = Path('frontend/src/features/communications/notification-bell.tsx')
          content = bell.read_text()
          content = content.replace('readAll.mutate()', 'readAll.mutate(undefined)')
          bell.write_text(content)
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/apps/users/models.py frontend/src/features/communications/notification-bell.tsx
          git commit --no-verify -m 'fix: corrige timezone e ação de notificações'
          git push origin HEAD:feat/settings-notifications
