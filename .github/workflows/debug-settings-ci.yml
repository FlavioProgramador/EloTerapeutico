name: Diagnóstico temporário de configurações

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/debug-settings-ci.yml

permissions:
  contents: read

jobs:
  django-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///debug-settings.sqlite3
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Instalar dependências
        run: python -m pip install -r requirements.txt
      - name: Executar Django check
        shell: bash
        run: |
          set +e
          python manage.py check > /tmp/django-check.txt 2>&1
          echo "EXIT=$?" >> /tmp/django-check.txt
          exit 0
      - name: Publicar diagnóstico
        uses: actions/upload-artifact@v4
        with:
          name: settings-django-check
          path: /tmp/django-check.txt
          retention-days: 1
          if-no-files-found: error
