name: Temporary apply run

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/temporary-apply-run.yml"

permissions:
  contents: write

jobs:
  apply:
    name: Apply validated code patches
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v7
        with:
          ref: agent/estabilizacao-completa-site
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply security and observability
        run: |
          git apply \
            --exclude=backend/apps/core/middleware.py \
            --exclude=backend/apps/core/tests/test_request_security_middleware.py \
            --check .tmp/stabilization-security.patch
          git apply \
            --exclude=backend/apps/core/middleware.py \
            --exclude=backend/apps/core/tests/test_request_security_middleware.py \
            .tmp/stabilization-security.patch
          git add .env.example backend/.env.example backend/apps/audit/services/request_context.py backend/apps/core/api/exceptions.py backend/config/settings/base.py backend/config/settings/production.py
          git commit -m "security: integra correlação e headers defensivos"

      - name: Apply Next.js proxy migration
        run: |
          git apply --check .tmp/stabilization-frontend.patch
          git apply .tmp/stabilization-frontend.patch
          git add -A frontend/auth-bff.test.mjs frontend/package.json frontend/src/middleware.ts frontend/src/proxy.ts
          git commit -m "refactor(frontend): migra middleware para proxy do Next"

      - name: Push validated code commits
        run: git push origin HEAD:agent/estabilizacao-completa-site
