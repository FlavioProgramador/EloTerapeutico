name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type check and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript checks
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit --pretty false > tsc-errors.txt 2>&1

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: frontend/tsc-errors.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Report TypeScript failure
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat tsc-errors.txt
          exit 1

      - name: Build Next.js application
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1/
        run: npm run build
