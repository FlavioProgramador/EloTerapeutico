name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type check, test and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint-output.txt

      - name: Run TypeScript checks
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typescript-output.txt

      - name: Run frontend tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - name: Build Next.js application
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1/
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-output.txt

      - name: Upload frontend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-reports
          path: |
            frontend/eslint-output.txt
            frontend/typescript-output.txt
            frontend/test-output.txt
            frontend/build-output.txt
          if-no-files-found: ignore
          retention-days: 7
