name: Sync main into documentation branch

on:
  push:
    branches:
      - "agent/refatoracao-documentacao-completa"
    paths:
      - ".github/workflows/sync-main-branch.yml"

permissions:
  contents: write

jobs:
  sync:
    name: Merge main into branch
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch with history
        uses: actions/checkout@v7
        with:
          ref: agent/refatoracao-documentacao-completa
          fetch-depth: 0

      - name: Merge current main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit -X ours origin/main
          git push origin HEAD:agent/refatoracao-documentacao-completa
