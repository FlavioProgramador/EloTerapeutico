name: Finalizar correções da telemedicina

on:
  push:
    branches:
      - agent/telemedicina-livekit
    paths:
      - .github/workflows/finish-telemedicine-fixes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v7
        with:
          ref: agent/telemedicina-livekit
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar Ruff
        run: python -m pip install "ruff>=0.14,<0.15"

      - name: Corrigir lint do backend
        run: |
          ruff check --fix \
            backend/apps/scheduling/api/views/telemedicine.py \
            backend/apps/scheduling/integrations/telemedicine/fake.py \
            backend/apps/scheduling/integrations/telemedicine/livekit.py
          ruff check \
            backend/apps/scheduling/api/views/telemedicine.py \
            backend/apps/scheduling/integrations/telemedicine/fake.py \
            backend/apps/scheduling/integrations/telemedicine/livekit.py
          if ! git diff --quiet -- backend/apps/scheduling; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/apps/scheduling
            git commit -m "fix(backend): corrige lint da integração LiveKit"
            git push origin HEAD:agent/telemedicina-livekit
          fi

      - name: Restaurar descrição acessível do cadastro
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("frontend/src/app/register/page.tsx")
          source = path.read_text(encoding="utf-8")
          old = 'alt="Bem-vindo ao Elo Terapêutico"'
          new = 'alt="Ilustração de um ambiente terapêutico acolhedor"'
          if old not in source and new not in source:
              raise SystemExit("Imagem de cadastro não encontrada.")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
          if ! git diff --quiet -- frontend/src/app/register/page.tsx; then
            git add frontend/src/app/register/page.tsx
            git commit -m "fix(frontend): restaura descrição da ilustração de cadastro"
            git push origin HEAD:agent/telemedicina-livekit
          fi

      - name: Remover workflow temporário
        run: |
          git pull --rebase origin agent/telemedicina-livekit
          rm .github/workflows/finish-telemedicine-fixes.yml
          git add .github/workflows/finish-telemedicine-fixes.yml
          git commit -m "ci: remove workflow temporário de correções"
          git push origin HEAD:agent/telemedicina-livekit
