name: Corrigir tipagem da telemedicina

on:
  push:
    branches:
      - agent/telemedicina-livekit
    paths:
      - .github/workflows/fix-telemedicine-mypy.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-telemedicine-mypy.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-types:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v7
        with:
          ref: agent/telemedicina-livekit
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Corrigir máquina de estados
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/apps/scheduling/models/remote.py")
          source = path.read_text(encoding="utf-8")
          old = "\n".join(
              [
                  "        allowed = self.ALLOWED_TRANSITIONS.get(self.status, set())",
                  "        if new_status not in allowed:",
                  "            raise ValidationError(",
                  "                {\"status\": f\"Transição inválida de {self.status} para {new_status}.\"}",
                  "            )",
                  "        self.status = new_status",
                  "        if new_status == self.Status.IN_PROGRESS and not self.started_at:",
                  "            self.started_at = timezone.now()",
                  "        if new_status in self.TERMINAL_STATUSES and not self.ended_at:",
                  "            self.ended_at = timezone.now()",
              ]
          )
          new = "\n".join(
              [
                  "        current_status = self.Status(self.status)",
                  "        target_status = self.Status(new_status)",
                  "        allowed = self.ALLOWED_TRANSITIONS.get(current_status, set())",
                  "        if target_status not in allowed:",
                  "            raise ValidationError(",
                  "                {\"status\": f\"Transição inválida de {self.status} para {new_status}.\"}",
                  "            )",
                  "        self.status = target_status",
                  "        if target_status == self.Status.IN_PROGRESS and not self.started_at:",
                  "            self.started_at = timezone.now()",
                  "        if target_status in self.TERMINAL_STATUSES and not self.ended_at:",
                  "            self.ended_at = timezone.now()",
              ]
          )
          if old not in source:
              raise SystemExit("Bloco da máquina de estados não encontrado.")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
          git add backend/apps/scheduling/models/remote.py
          git commit -m "fix(telemedicina): tipa transições de estado"
          git push origin HEAD:agent/telemedicina-livekit

      - name: Corrigir tipagem dos system checks
        run: |
          git pull --rebase origin agent/telemedicina-livekit
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/apps/scheduling/checks.py")
          source = path.read_text(encoding="utf-8")
          old = "    issues = []\n"
          new = "    issues: list[Error | Warning] = []\n"
          if old not in source:
              raise SystemExit("Declaração de issues não encontrada.")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
          git add backend/apps/scheduling/checks.py
          git commit -m "fix(telemedicina): tipa mensagens dos system checks"
          git push origin HEAD:agent/telemedicina-livekit

      - name: Corrigir atributo temporário do signal
        run: |
          git pull --rebase origin agent/telemedicina-livekit
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/apps/scheduling/receivers/appointments.py")
          source = path.read_text(encoding="utf-8")
          old_none = "        instance._telemedicine_previous_state = None\n"
          old_assignment = "    instance._telemedicine_previous_state = (\n"
          old_close = "        .first()\n    )\n\n\n@receiver(\n"
          if old_none not in source or old_assignment not in source or old_close not in source:
              raise SystemExit("Bloco do estado anterior não encontrado.")
          source = source.replace(
              old_none,
              "        setattr(instance, \"_telemedicine_previous_state\", None)\n",
              1,
          )
          source = source.replace(
              old_assignment,
              "    setattr(instance, \"_telemedicine_previous_state\", (\n",
              1,
          )
          source = source.replace(
              old_close,
              "        .first()\n    ))\n\n\n@receiver(\n",
              1,
          )
          path.write_text(source, encoding="utf-8")
          PY
          git add backend/apps/scheduling/receivers/appointments.py
          git commit -m "fix(telemedicina): registra estado anterior sem atributo dinâmico"
          git push origin HEAD:agent/telemedicina-livekit

      - name: Remover workflow temporário
        run: |
          git pull --rebase origin agent/telemedicina-livekit
          rm .github/workflows/fix-telemedicine-mypy.yml
          git add .github/workflows/fix-telemedicine-mypy.yml
          git commit -m "ci: remove workflow temporário de tipagem"
          git push origin HEAD:agent/telemedicina-livekit
