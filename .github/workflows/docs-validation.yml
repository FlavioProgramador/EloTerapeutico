name: Documentation Validation

on:
  push:
    branches:
      - "docs/**"
      - "agent/**"
    paths:
      - "README.md"
      - "docs/**"
      - "scripts/validate_docs.py"
      - "scripts/validate_docs_wrapper.py"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "backend/config/settings/**"
      - "backend/config/urls.py"
      - "backend/requirements*.txt"
      - "frontend/package.json"
      - ".env.example"
      - "backend/.env.example"
      - "frontend/.env.example"
      - ".github/workflows/docs-validation.yml"
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "scripts/validate_docs.py"
      - "scripts/validate_docs_wrapper.py"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "backend/config/settings/**"
      - "backend/config/urls.py"
      - "backend/requirements*.txt"
      - "frontend/package.json"
      - ".env.example"
      - "backend/.env.example"
      - "frontend/.env.example"
      - ".github/workflows/docs-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Documentation and Compose consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Prepare safe Compose environment
        run: cp .env.example .env

      - name: Validate documentation
        run: |
          set -o pipefail
          python3 scripts/validate_docs_wrapper.py 2>&1 | tee docs-validation.log

      - name: Validate Docker Compose
        if: always()
        run: |
          set -o pipefail
          {
            echo "Docker Compose configuration"
            docker compose config --quiet
            echo
            echo "Services"
            docker compose config --services
          } 2>&1 | tee compose-validation.log

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-validation-report
          path: |
            docs-validation.log
            compose-validation.log
          if-no-files-found: error
          retention-days: 7

      - name: Show documentation report
        if: always()
        run: cat docs-validation.log

      - name: Show Compose report
        if: always()
        run: cat compose-validation.log