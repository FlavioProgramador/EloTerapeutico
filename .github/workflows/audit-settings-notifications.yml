name: Diagnóstico temporário de aplicação

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/audit-settings-notifications.yml

permissions:
  contents: read

jobs:
  diagnose-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0
          show-progress: false

      - name: Reconstruir patches
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          domain = Path('.github/patches/02-domain.part02')
          domain.write_bytes(domain.read_bytes() + b' ]\n')
          for filename in (
              '.github/patches/04-front-settings.part03',
              '.github/patches/05-front-notifications.part01',
          ):
              path = Path(filename)
              content = path.read_bytes()
              if not content.endswith(b' '):
                  raise SystemExit(filename)
              path.write_bytes(content[:-1])
          PY
          cat .github/patches/01-settings.part* > /tmp/01-settings.diff
          cat .github/patches/02-domain.part* > /tmp/02-domain.diff
          cat .github/patches/03-services.part* > /tmp/03-services.diff
          cat .github/patches/04-front-settings.part* > /tmp/04-front-settings.diff
          cat .github/patches/05-front-notifications.part* > /tmp/05-front-notifications.diff
          cat .github/patches/06-docs.part* > /tmp/06-docs.diff

      - name: Testar aplicação sequencial
        shell: bash
        run: |
          set +e
          report=/tmp/apply-diagnostic.txt
          : > "$report"
          for patch in /tmp/01-settings.diff /tmp/02-domain.diff /tmp/03-services.diff /tmp/04-front-settings.diff /tmp/05-front-notifications.diff /tmp/06-docs.diff; do
            echo "===== $patch =====" >> "$report"
            git apply --check --verbose "$patch" >> "$report" 2>&1
            code=$?
            echo "CHECK_EXIT=$code" >> "$report"
            if [[ $code -ne 0 ]]; then
              break
            fi
            git apply "$patch" >> "$report" 2>&1
            code=$?
            echo "APPLY_EXIT=$code" >> "$report"
            if [[ $code -ne 0 ]]; then
              break
            fi
          done
          git status --short >> "$report"
          exit 0

      - name: Publicar diagnóstico
        uses: actions/upload-artifact@v4
        with:
          name: settings-notifications-apply-diagnostic
          path: /tmp/apply-diagnostic.txt
          retention-days: 1
          if-no-files-found: error
