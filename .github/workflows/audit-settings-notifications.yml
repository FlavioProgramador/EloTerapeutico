name: Diagnóstico temporário de configurações e notificações

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/audit-settings-notifications.yml

permissions:
  contents: read

jobs:
  export-fragments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 1
          show-progress: false

      - name: Publicar fragmentos divergentes
        uses: actions/upload-artifact@v4
        with:
          name: settings-notifications-divergent-fragments
          path: |
            .github/patches/02-domain.part02
            .github/patches/04-front-settings.part03
            .github/patches/05-front-notifications.part01
          retention-days: 1
          if-no-files-found: error
