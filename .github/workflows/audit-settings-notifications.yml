name: Aplicação temporária de configurações e notificações

on:
  push:
    branches:
      - feat/settings-notifications
    paths:
      - .github/workflows/audit-settings-notifications.yml
      - .github/patches/**

permissions:
  contents: write

jobs:
  apply-patches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0

      - name: Aplicar alterações organizadas
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .github/patches/backend.part01
            .github/patches/backend.part02
            .github/patches/backend.part03
            .github/patches/backend.part04
            .github/patches/backend.part05
            .github/patches/frontend.part01
            .github/patches/frontend.part02
            .github/patches/frontend.part03
            .github/patches/docs.part01
          )
          for part in "${required[@]}"; do
            if [[ ! -f "$part" ]]; then
              echo "Aguardando $part."
              exit 0
            fi
          done

          cat .github/patches/backend.part* | base64 --decode | xz --decompress > /tmp/settings-backend.patch
          cat .github/patches/frontend.part* | base64 --decode | xz --decompress > /tmp/settings-frontend.patch
          cat .github/patches/docs.part* | base64 --decode | xz --decompress > /tmp/settings-docs.patch

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git apply --check /tmp/settings-backend.patch
          git apply /tmp/settings-backend.patch
          git add backend
          git commit -m "feat: implementa configurações e domínio de notificações"

          git apply --check /tmp/settings-frontend.patch
          git apply /tmp/settings-frontend.patch
          git add frontend
          git commit -m "feat: cria central de configurações e notificações"

          git apply --check /tmp/settings-docs.patch
          git apply /tmp/settings-docs.patch
          git add docs
          git commit -m "docs: documenta configurações e notificações"

          git rm -r .github/patches
          git rm .github/workflows/audit-settings-notifications.yml
          git commit -m "chore: remove arquivos temporários da implementação"
          git push origin HEAD:feat/settings-notifications
