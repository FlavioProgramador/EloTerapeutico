name: Aplicação temporária de configurações e notificações

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/audit-settings-notifications.yml
      - .github/patches/**
  push:
    branches:
      - feat/settings-notifications
    paths:
      - .github/workflows/audit-settings-notifications.yml
      - .github/patches/**

permissions:
  contents: write

jobs:
  apply-patches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0

      - name: Aplicar alterações organizadas
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .github/patches/01-settings.part03
            .github/patches/02-domain.part02
            .github/patches/03-services.part04
            .github/patches/04-front-settings.part04
            .github/patches/05-front-notifications.part03
            .github/patches/06-docs.part01
          )
          for part in "${required[@]}"; do
            if [[ ! -f "$part" ]]; then
              echo "Aguardando $part."
              exit 0
            fi
          done

          cat .github/patches/01-settings.part* > /tmp/01-settings.diff
          cat .github/patches/02-domain.part* > /tmp/02-domain.diff
          cat .github/patches/03-services.part* > /tmp/03-services.diff
          cat .github/patches/04-front-settings.part* > /tmp/04-front-settings.diff
          cat .github/patches/05-front-notifications.part* > /tmp/05-front-notifications.diff
          cat .github/patches/06-docs.part* > /tmp/06-docs.diff

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git apply --check /tmp/01-settings.diff
          git apply /tmp/01-settings.diff
          git add backend
          git commit -m "feat: implementa configurações persistentes"

          git apply --check /tmp/02-domain.diff
          git apply /tmp/02-domain.diff
          git apply --check /tmp/03-services.diff
          git apply /tmp/03-services.diff
          git add backend
          git commit -m "feat: implementa domínio e API de notificações"

          git apply --check /tmp/04-front-settings.diff
          git apply /tmp/04-front-settings.diff
          git add frontend
          git commit -m "feat: conecta o módulo de configurações"

          git apply --check /tmp/05-front-notifications.diff
          git apply /tmp/05-front-notifications.diff
          git add frontend
          git commit -m "feat: cria central completa de notificações"

          git apply --check /tmp/06-docs.diff
          git apply /tmp/06-docs.diff
          git add docs
          git commit -m "docs: documenta configurações e notificações"

          git rm -r .github/patches
          git rm .github/workflows/audit-settings-notifications.yml
          git commit -m "chore: remove arquivos temporários da implementação"
          git push origin HEAD:feat/settings-notifications
