name: Publicação temporária de configurações e notificações

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/audit-settings-notifications.yml

permissions:
  contents: write

jobs:
  publish-implementation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0
          show-progress: false

      - name: Reconstruir e validar patches
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          domain = Path('.github/patches/02-domain.part02')
          domain.write_bytes(domain.read_bytes() + b' ]\n')
          for filename in (
              '.github/patches/04-front-settings.part03',
              '.github/patches/05-front-notifications.part01',
          ):
              path = Path(filename)
              content = path.read_bytes()
              if not content.endswith(b' '):
                  raise SystemExit(filename)
              path.write_bytes(content[:-1])
          PY

          cat .github/patches/01-settings.part* > /tmp/01-settings.diff
          cat .github/patches/02-domain.part* > /tmp/02-domain.diff
          cat .github/patches/03-services.part* > /tmp/03-services.diff
          cat .github/patches/04-front-settings.part* > /tmp/04-front-settings.diff
          cat .github/patches/05-front-notifications.part* > /tmp/05-front-notifications.diff
          cat .github/patches/06-docs.part* > /tmp/06-docs.diff

          echo 'b376adefe467cd5decd8b43ce705fce0ff01dbe0ecfae5dbd3a639c6cadc363f  /tmp/01-settings.diff' | sha256sum -c -
          echo 'c111b9033349c90a07bf6344ce71f36b77dd9f94f807ae36a6ab6033e32afa94  /tmp/02-domain.diff' | sha256sum -c -
          echo '0e6886936cc4656e6e4c1b7c905c04da92d3914fb2181ab4118e730c176ba76e  /tmp/03-services.diff' | sha256sum -c -
          echo 'ecdb9bcd180a78fe85df5b5cb3fa397d902b04a5afcd035f58c3f3ac966d596d  /tmp/04-front-settings.diff' | sha256sum -c -
          echo '40c3736127e897aa954850c6e2e60ca38a7b8d40cc90a5cbbcaba6a94a95593d  /tmp/05-front-notifications.diff' | sha256sum -c -
          echo '21e890b3d48ef3199c7560dc71679b69ea3ac7f465e63c2d1ab278b7ec2f644e  /tmp/06-docs.diff' | sha256sum -c -

      - name: Criar e publicar commits
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git apply /tmp/01-settings.diff
          git add backend
          git commit --no-verify -m 'feat: implementa configurações persistentes'

          git apply /tmp/02-domain.diff
          git apply /tmp/03-services.diff
          git add backend
          git commit --no-verify -m 'feat: implementa domínio e API de notificações'

          git apply /tmp/04-front-settings.diff
          git add frontend
          git commit --no-verify -m 'feat: conecta o módulo de configurações'

          git apply /tmp/05-front-notifications.diff
          git add frontend
          git commit --no-verify -m 'feat: cria central completa de notificações'

          git apply /tmp/06-docs.diff
          git add docs
          git commit --no-verify -m 'docs: documenta configurações e notificações'

          git push origin HEAD:feat/settings-notifications
