name: Aplicação temporária de configurações e notificações

on:
  push:
    branches:
      - feat/settings-notifications
    paths:
      - .github/workflows/audit-settings-notifications.yml
      - .github/patches/**

permissions:
  contents: write

jobs:
  apply-patches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0

      - name: Aplicar alterações organizadas
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .github/patches/01-backend-settings.diff
            .github/patches/02-notifications-domain.diff
            .github/patches/03-notifications-services.diff
            .github/patches/04-frontend-settings.diff
            .github/patches/05-frontend-notifications.diff
            .github/patches/06-docs.diff
          )
          for patch in "${required[@]}"; do
            if [[ ! -f "$patch" ]]; then
              echo "Aguardando $patch."
              exit 0
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git apply --check .github/patches/01-backend-settings.diff
          git apply .github/patches/01-backend-settings.diff
          git add backend
          git commit -m "feat: implementa configurações persistentes"

          git apply --check .github/patches/02-notifications-domain.diff
          git apply .github/patches/02-notifications-domain.diff
          git apply --check .github/patches/03-notifications-services.diff
          git apply .github/patches/03-notifications-services.diff
          git add backend
          git commit -m "feat: implementa domínio e API de notificações"

          git apply --check .github/patches/04-frontend-settings.diff
          git apply .github/patches/04-frontend-settings.diff
          git add frontend
          git commit -m "feat: conecta o módulo de configurações"

          git apply --check .github/patches/05-frontend-notifications.diff
          git apply .github/patches/05-frontend-notifications.diff
          git add frontend
          git commit -m "feat: cria central completa de notificações"

          git apply --check .github/patches/06-docs.diff
          git apply .github/patches/06-docs.diff
          git add docs
          git commit -m "docs: documenta configurações e notificações"

          git rm -r .github/patches
          git rm .github/workflows/audit-settings-notifications.yml
          git commit -m "chore: remove arquivos temporários da implementação"
          git push origin HEAD:feat/settings-notifications
