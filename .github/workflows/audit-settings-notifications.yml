name: Aplicação temporária de configurações e notificações

on:
  push:
    branches:
      - feat/settings-notifications
    paths:
      - .github/workflows/audit-settings-notifications.yml
      - .github/settings-backend.patch
      - .github/settings-frontend.patch
      - .github/settings-docs.patch

permissions:
  contents: write

jobs:
  apply-patches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0

      - name: Aplicar alterações organizadas
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .github/settings-backend.patch || ! -f .github/settings-frontend.patch || ! -f .github/settings-docs.patch ]]; then
            echo "Aguardando todos os patches."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git apply --check .github/settings-backend.patch
          git apply .github/settings-backend.patch
          git add backend
          git commit -m "feat: implementa configurações e domínio de notificações"

          git apply --check .github/settings-frontend.patch
          git apply .github/settings-frontend.patch
          git add frontend
          git commit -m "feat: cria central de configurações e notificações"

          git apply --check .github/settings-docs.patch
          git apply .github/settings-docs.patch
          git add docs
          git commit -m "docs: documenta configurações e notificações"

          git rm .github/settings-backend.patch .github/settings-frontend.patch .github/settings-docs.patch
          git rm .github/workflows/audit-settings-notifications.yml
          git commit -m "chore: remove arquivos temporários da implementação"
          git push origin HEAD:feat/settings-notifications
