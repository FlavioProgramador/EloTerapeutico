name: Diagnóstico temporário de configurações e notificações

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/audit-settings-notifications.yml
      - .github/patches/**

permissions:
  contents: read

jobs:
  diagnose-patches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 1
          show-progress: false

      - name: Gerar hashes dos fragmentos
        shell: bash
        run: |
          report=/tmp/patch-diagnostic.txt
          : > "$report"
          sha256sum .github/patches/02-domain.part* >> "$report"
          sha256sum .github/patches/04-front-settings.part* >> "$report"
          sha256sum .github/patches/05-front-notifications.part* >> "$report"

      - name: Publicar diagnóstico
        uses: actions/upload-artifact@v4
        with:
          name: settings-notifications-part-diagnostic
          path: /tmp/patch-diagnostic.txt
          retention-days: 1
          if-no-files-found: error
