name: Aplicação temporária de configurações e notificações

on:
  push:
    branches:
      - feat/settings-notifications
    paths:
      - .github/workflows/audit-settings-notifications.yml
      - .github/patches/**

permissions:
  contents: write

jobs:
  apply-bundles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: feat/settings-notifications
          fetch-depth: 0

      - name: Aplicar alterações organizadas
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .github/patches/bundle-backend.part00
            .github/patches/bundle-backend.part01
            .github/patches/bundle-frontend.part00
            .github/patches/bundle-docs.part00
          )
          for part in "${required[@]}"; do
            if [[ ! -f "$part" ]]; then
              echo "Aguardando $part."
              exit 0
            fi
          done

          cat .github/patches/bundle-backend.part* | base64 --decode | tar -xJf - -C .
          cat .github/patches/bundle-frontend.part* | base64 --decode | tar -xJf - -C .
          cat .github/patches/bundle-docs.part* | base64 --decode | tar -xJf - -C .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add backend
          git commit -m "feat: implementa configurações e domínio de notificações"

          git add frontend
          git commit -m "feat: cria central de configurações e notificações"

          git add docs
          git commit -m "docs: documenta configurações e notificações"

          git rm -r .github/patches
          git rm .github/workflows/audit-settings-notifications.yml
          git commit -m "chore: remove arquivos temporários da implementação"
          git push origin HEAD:feat/settings-notifications
