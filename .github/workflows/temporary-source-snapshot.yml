name: Temporary source snapshot

on:
  push:
    branches:
      - "agent/estabilizacao-completa-site"
    paths:
      - ".github/workflows/temporary-source-snapshot.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temporary-source-snapshot.yml"

permissions:
  contents: read

jobs:
  snapshot:
    name: Package repository source
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v7

      - name: Create source archive
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=__pycache__ \
            --exclude=.pytest_cache \
            --exclude=.mypy_cache \
            --exclude=.ruff_cache \
            -czf /tmp/elo-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: elo-source-snapshot
          path: /tmp/elo-source.tar.gz
          if-no-files-found: error
          retention-days: 1
