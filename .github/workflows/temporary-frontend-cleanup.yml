name: Temporary frontend cleanup

on:
  push:
    branches:
      - "agent/estabilizacao-completa-site"
    paths:
      - ".github/workflows/temporary-frontend-cleanup.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/temporary-frontend-cleanup.yml"

permissions:
  contents: write

jobs:
  cleanup:
    name: Validate and apply frontend cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v7
        with:
          ref: agent/estabilizacao-completa-site
          fetch-depth: 0

      - name: Apply deterministic transformations
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              content = file_path.read_text(encoding="utf-8")
              if old not in content:
                  raise SystemExit(f"Trecho esperado não encontrado em {path}: {old[:80]!r}")
              file_path.write_text(content.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "frontend/src/app/dashboard/configuracoes/atendimento/page.tsx",
              '''              const {
                telemedicine_available: _available,
                telemedicine_unavailable_reason: _reason,
                ...payload
              } = form;
''',
              '''              const payload = Object.fromEntries(
                Object.entries(form).filter(
                  ([key]) =>
                    key !== "telemedicine_available" &&
                    key !== "telemedicine_unavailable_reason",
                ),
              );
''',
          )

          replace_once(
              "frontend/src/app/onboarding/page.tsx",
              'import { useForm, type FieldPath } from "react-hook-form";',
              'import { useForm, useWatch, type FieldPath } from "react-hook-form";',
          )
          replace_once(
              "frontend/src/app/onboarding/page.tsx",
              "  const values = form.watch();",
              "  const values = useWatch({ control: form.control });",
          )

          billing_modal = "frontend/src/features/financeiro/components/financeiro-new-billing-modal.tsx"
          replace_once(
              billing_modal,
              'import { useMemo, useState, useEffect, useId } from "react";\nimport { Check, Info } from "lucide-react";\n',
              'import { useEffect, useId, useMemo, useState } from "react";\n',
          )
          replace_once(
              billing_modal,
              '''  const selectedPatient = patients.find((p) => p.id === Number(patientId));
  const patientDefaultValue = "0.00"; // Should come from patient data if available, stubbed here
''',
              '''  const selectedPatient = patients.find((patient) => patient.id === Number(patientId));
  const patientDefaultValue = selectedPatient?.session_value ?? "0.00";
''',
          )

          panel = "frontend/src/features/financeiro/components/financeiro-transactions-panel.tsx"
          replace_once(panel, 'import { CheckCircle2, Plus, ReceiptText, XCircle } from "lucide-react";', 'import { Plus, ReceiptText } from "lucide-react";')
          replace_once(panel, '    <Card className="overflow-hidden">', '    <Card className="overflow-hidden" aria-busy={actionPending || undefined}>')

          dashboard = "frontend/src/features/financeiro/financeiro-dashboard.tsx"
          replace_once(
              dashboard,
              '''          onEdit={(id) => {
            import("sonner").then(({ toast }) =>
              toast.info("Edição de transação será implementada em breve."),
            );
          }}
''',
              "",
          )

          landing = "frontend/src/features/landing/new-sections.tsx"
          replace_once(landing, 'import Link from "next/link";', 'import Image from "next/image";\nimport Link from "next/link";')
          replace_once(landing, 'import { cn } from "@/lib/utils";\n', '')
          replace_once(
              landing,
              '''        <img
          src="/landing_hero.jpg"
          alt="Terapia Acolhedora"
          className="w-full h-full object-cover object-[75%_center]"
        />''',
              '''        <Image
          src="/landing_hero.jpg"
          alt="Terapia acolhedora"
          fill
          priority
          sizes="100vw"
          className="object-cover object-[75%_center]"
        />''',
          )
          replace_once(
              landing,
              '''              <img
                src="/landing_about_therapy.png"
                alt="Sessão de terapia"
                className="w-full h-auto object-cover aspect-[4/3]"
              />''',
              '''              <Image
                src="/landing_about_therapy.png"
                alt="Sessão de terapia"
                width={1200}
                height={900}
                sizes="(min-width: 1024px) 50vw, 100vw"
                className="aspect-[4/3] h-auto w-full object-cover"
              />''',
          )
          replace_once(
              landing,
              '''          <img
            src="/landing_video_thumbnail.png"
            alt="Demonstração do sistema"
            className="w-full aspect-video object-cover"
          />''',
              '''          <Image
            src="/landing_video_thumbnail.png"
            alt="Demonstração do sistema"
            width={1600}
            height={900}
            sizes="100vw"
            className="aspect-video w-full object-cover"
          />''',
          )
          replace_once(
              landing,
              '''          <button className="absolute bottom-6 left-6 w-12 h-12 flex items-center justify-center rounded-full bg-black/50 text-white hover:bg-black/70 transition-colors backdrop-blur-sm">
            <Play className="w-6 h-6 fill-current" />
          </button>''',
              '''          <div
            aria-hidden="true"
            className="absolute bottom-6 left-6 flex h-12 w-12 items-center justify-center rounded-full bg-black/50 text-white backdrop-blur-sm"
          >
            <Play className="h-6 w-6 fill-current" />
          </div>''',
          )
          replace_once(
              landing,
              '''            <img
              src="/landing_tailored_care.png"
              alt="Ambiente Terapêutico"
              className="w-full h-full object-cover"
            />''',
              '''            <Image
              src="/landing_tailored_care.png"
              alt="Ambiente terapêutico"
              width={1200}
              height={1600}
              sizes="(min-width: 1024px) 50vw, 100vw"
              className="h-full w-full object-cover"
            />''',
          )

          submit = "frontend/src/features/patients/components/patient-form-submit.ts"
          replace_once(submit, "    photo: _photo,", "    photo,")
          replace_once(submit, "  } = data;\n  return {", "  } = data;\n  void photo;\n  return {")

          replace_once(
              "frontend/src/features/patients/components/patient-list-panel.tsx",
              "                  aria-selected={selected}",
              "                  aria-pressed={selected}",
          )

          patient_hook = "frontend/src/features/patients/hooks/use-patient-form-state.ts"
          replace_once(patient_hook, 'import { useForm } from "react-hook-form";', 'import { useForm, useWatch } from "react-hook-form";')
          replace_once(patient_hook, '  const birthDate = form.watch("birth_date");', '  const birthDate = useWatch({ control: form.control, name: "birth_date" });')

          appointments = "frontend/src/features/records/components/appointments-tab.tsx"
          replace_once(appointments, 'import React, { useState } from "react";\n', '')
          replace_once(appointments, "  Video,\n", "")
          replace_once(appointments, "  const [page, setPage] = useState(1);", "  const page = 1;")

          auth_session = "frontend/src/lib/auth-session.ts"
          replace_once(
              auth_session,
              '''export function persistAuthTokens(
  _access: string,
  _refresh?: string | null,
): void {
  // Intencionalmente vazio: credenciais nunca são persistidas pelo JavaScript.
}''',
              '''export function persistAuthTokens(
  access: string,
  refresh?: string | null,
): void {
  void access;
  void refresh;
  // Intencionalmente vazio: credenciais nunca são persistidas pelo JavaScript.
}''',
          )
          replace_once(
              auth_session,
              '''export function persistAuthRole(_role: string): void {
  // Intencionalmente vazio: papel não é usado como cookie de autorização.
}''',
              '''export function persistAuthRole(role: string): void {
  void role;
  // Intencionalmente vazio: papel não é usado como cookie de autorização.
}''',
          )
          PY

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validate lint
        working-directory: frontend
        run: npm run lint

      - name: Validate types
        working-directory: frontend
        run: npm run typecheck

      - name: Validate tests
        working-directory: frontend
        run: npm test

      - name: Validate build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Commit validated cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src
          git commit -m "refactor(frontend): remove warnings mecânicos e placeholders"
          git push origin HEAD:agent/estabilizacao-completa-site
