name: Dependency Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependency-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements/*.txt

      - name: Install audit tool
        run: python -m pip install --quiet --upgrade pip pip-audit

      - name: Audit Python dependencies
        id: python_audit
        continue-on-error: true
        run: pip-audit --progress-spinner off --format json --output pip-audit.json -r requirements.txt

      - name: Upload Python audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-report
          path: backend/pip-audit.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Python audit result
        if: steps.python_audit.outcome == 'failure'
        run: exit 1

  npm-audit:
    name: Audit npm dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
