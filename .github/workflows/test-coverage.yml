name: Test Coverage

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///coverage-ci.sqlite3
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: cp .env.example .env
      - run: python manage.py check
      - run: pytest --cov-config=.coveragerc --cov=apps --cov=core --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=80
      - run: python scripts/coverage_by_module.py
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
