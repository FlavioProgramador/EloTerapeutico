name: Test Coverage

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-coverage:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///coverage-ci.sqlite3
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: echo coverage
