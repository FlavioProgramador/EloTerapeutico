name: Format Communications Sources

on:
  push:
    branches:
      - feat/modulo-comunicacoes
    paths:
      - "backend/apps/communications/**"
      - ".github/workflows/format-communications.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/modulo-comunicacoes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: python -m pip install "ruff>=0.9,<1.0"

      - name: Apply Ruff fixes
        run: |
          ruff check backend/apps/communications \
            --config backend/pyproject.toml \
            --fix

      - name: Commit formatted sources
        run: |
          if git diff --quiet -- backend/apps/communications; then
            echo "Nenhuma alteração de formatação necessária."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/apps/communications
          git commit -m "style(communications): aplicar autofix do Ruff"
          git push origin HEAD:feat/modulo-comunicacoes
