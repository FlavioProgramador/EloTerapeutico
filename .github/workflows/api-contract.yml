name: API Contract

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/src/**"
      - "scripts/validate_api_contract.py"
      - ".github/workflows/api-contract.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/src/**"
      - "scripts/validate_api_contract.py"
      - ".github/workflows/api-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: OpenAPI and frontend routes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: elo_contract_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d elo_contract_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/elo_contract_ci
      ASAAS_API_KEY: ""
      BILLING_WEBHOOK_PROCESS_INLINE: "True"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Generate ephemeral credentials
        shell: bash
        run: |
          python - <<'PY'
          import os
          import secrets

          values = {
              "SECRET_KEY": secrets.token_urlsafe(64),
              "JWT_SECRET": secrets.token_urlsafe(64),
              "FIELD_ENCRYPTION_KEY": secrets.token_urlsafe(32),
              "ASAAS_WEBHOOK_TOKEN": secrets.token_urlsafe(32),
          }
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              for key, value in values.items():
                  env_file.write(f"{key}={value}\n")
          PY

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Generate and validate OpenAPI
        working-directory: backend
        run: |
          mkdir -p ../artifacts
          python manage.py spectacular \
            --format openapi-json \
            --file ../artifacts/openapi.json \
            --validate

      - name: Compare frontend calls with OpenAPI
        run: |
          python scripts/validate_api_contract.py \
            --schema artifacts/openapi.json \
            --frontend-root frontend/src \
            --report artifacts/api-contract-report.json

      - name: Upload contract reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-reports
          path: artifacts/
          if-no-files-found: error
          retention-days: 7
