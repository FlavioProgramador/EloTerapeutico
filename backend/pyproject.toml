[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["migrations", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "DJ", "C90"]
ignore = ["E203"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.isort]
known-first-party = ["apps", "elo_terapeutico"]

[tool.ruff.lint.per-file-ignores]
"**/tests/*" = ["S101"]
"core/*.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "elo_terapeutico.settings.test"
python_files = ["test_*.py", "*_test.py", "tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--reuse-db", "--strict-markers", "-ra", "--tb=short"]
markers = [
  "slow: testes de maior duracao",
  "integration: testes de integracao",
]

[tool.coverage.run]
branch = true
source = ["apps", "elo_terapeutico"]
omit = ["*/migrations/*", "*/tests/*", "manage.py", "core/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main"]
exclude = ["migrations", "^core/"]
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true

[tool.django-stubs]
django_settings_module = "elo_terapeutico.settings.test"
