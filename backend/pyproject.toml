[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["migrations", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "DJ", "C90"]
ignore = ["E203", "DJ001", "DJ008", "DJ012", "F401", "B904", "E501", "C901", "E731", "B007", "E402", "F841"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.ruff.lint.per-file-ignores]
"**/tests/*" = ["S101", "E501"]
"apps/core/*.py" = ["F401"]
"config/settings/*.py" = ["F405", "F403"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py", "*_test.py", "tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--reuse-db", "--strict-markers", "-ra", "--tb=short"]
markers = [
  "slow: testes de maior duracao",
  "integration: testes de integracao",
]

[tool.coverage.run]
branch = true
source = ["apps", "config"]
omit = ["*/migrations/*", "*/tests/*", "manage.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main"]
exclude = ["migrations", "^apps/core/", "tests", ".*_test\\.py$", "test_.*\\.py$", "dashboard_queries.py", "run_export_worker.py", "audit.py", "evolution_flow_models.py", "appointments.py", "review_filter.py", "fields.py", "managers.py", "test.py", "utils.py"]
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
mypy_path = "."
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "apps.documents.serializers",
    "apps.agenda.serializer_parts.appointment_write",
    "apps.core.api.pagination",
    "apps.records.clinical_views",
    "apps.records.api.evolution_views",
    "apps.records.api.evolution_attachment_list_views",
    "apps.records.api.evolution_attachment_detail_views",
    "apps.patients.form_serializers",
    "apps.financeiro.api.actions.states",
    "apps.financeiro.api.actions.payments",
    "apps.financeiro.api.actions.lists",
    "apps.agenda.serializer_parts.*",
    "apps.users.api.serializers",
    "apps.patients.api.views",
    "apps.patients.actions.dashboard",
    "apps.documents.views",
    "apps.users.api.views",
    "apps.patients.api.dashboard_actions",
    "apps.agenda.view_parts.*",
    "apps.patients.api.urls",
    "apps.records.api.views.secure_document_views",
    "apps.records.api.serializers.*",
    "apps.patients.admin",
    "apps.patients.admin_parts.*",
    "apps.patients.model_parts.*",
    "apps.patients.api.serializers.*",
    "apps.patients.api.views.*",
    "apps.agenda.services.*",
    "apps.agenda.api.views.*",
    "apps.agenda.api.serializers.*",
    "apps.documents.services.*",
    "apps.documents.api.views.*",
    "apps.documents.api.serializers.*",
    "apps.forms.api.serializers.*",
    "apps.forms.api.views.*",
    "apps.core.quality.*",
    "apps.documents.services",
    "apps.agenda.services",
    "apps.forms.migrations.*",
    "apps.records.serializers",
    "apps.records.clinical_serializers",
    "apps.records.api.evolution_serializer_fields",
    "apps.patients.workspace_serializers",
    "apps.forms.serializers",
    "apps.financeiro.serializers.transactions",
    "apps.financeiro.api.actions.summaries",
    "apps.financeiro.api.actions.reports"
]
ignore_errors = true

[tool.django-stubs]
django_settings_module = "config.settings.test"

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv", "migrations"]
skips = ["B101"]
