[pytest]
DJANGO_SETTINGS_MODULE = elo_terapeutico.settings.test
python_files = tests/*.py tests/**/*.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --strict-markers
    --strict-config
    -v
    --tb=short
markers =
    unit: testes unitários rápidos e isolados
    integration: testes de integração com banco ou API
    security: testes de autorização, isolamento e privacidade
    e2e: testes de ponta a ponta
    slow: testes de execução lenta
